<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>完了</title>
  <meta name="robots" content="noindex, nofollow">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
      background: #f5f5f5;
      color: #333;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .wrap {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.07);
      max-width: 440px;
      width: 100%;
      padding: 48px 32px;
      text-align: center;
    }
    .check {
      width: 64px;
      height: 64px;
      margin: 0 auto 24px;
      background: #e6f7ee;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .check svg {
      width: 32px;
      height: 32px;
      stroke: #22a85f;
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }
    h1 {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 16px;
    }
    p {
      font-size: 0.9rem;
      color: #666;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="check"><svg viewBox="0 0 32 32"><polyline points="8 16 14 22 24 10"/></svg></div>
    <h1>ありがとうございました</h1>
    <p>お手続きは完了しました。<br>このページは閉じていただいて問題ありません。</p>
  </div>

  <!-- CVタグをここに貼る -->

</body>
</html>
